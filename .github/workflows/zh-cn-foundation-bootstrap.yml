name: zh-CN foundation bootstrap

on:
  push:
    branches:
      - agent/zh-cn-i18n-foundation

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply baseline patch
        run: python tools/bootstrap_zh_cn_foundation.py

      - name: Validate Python syntax
        run: |
          python -m py_compile library/i18n.py configure.py

      - name: Run localization unit tests
        run: python -m unittest tests.test_i18n -v

      - name: Commit generated baseline fix
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configure.py
          git commit -m "fix: correct 2.8-inch USB display constant [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
