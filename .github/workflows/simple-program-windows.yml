name: Simple program (Windows)

on:
  push:
    branches:
      - main
      - 'releases/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: simple-program-windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  simple-program:
    name: Simple program (Windows)
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run simple-program.py during 20 seconds
      run: |
        # For tests there is no real HW: use simulated LCD mode
        (Get-Content simple-program.py) -replace "^REVISION.*$","REVISION=`\"SIMU`\"" | Set-Content simple-program.py

        # Keep the process handle so redirected files are closed before reading them.
        $process = Start-Process -FilePath python -ArgumentList "simple-program.py" -NoNewWindow -PassThru -RedirectStandardOutput output.log -RedirectStandardError error.log
        Start-Sleep -Seconds 20
        if (-not $process.HasExited)
        {
            Stop-Process -Id $process.Id -Force
            $process.WaitForExit()
        }
        if (Test-Path error.log)
        {
            Get-Content error.log | Add-Content output.log
        }

    - name: Check output for errors
      run: |
        echo "######## Output : ########"
        cat output.log

        $SEL = Select-String -Path output.log -Pattern "error"
        if ($SEL -ne $null)
        {
            throw "Program failed to run, see output above"
        }
        $SEL = Select-String -Path output.log -Pattern "traceback"
        if ($SEL -ne $null)
        {
            throw "Program failed to run, see output above"
        }
        $SEL = Select-String -Path output.log -Pattern "exception"
        if ($SEL -ne $null)
        {
            throw "Program failed to run, see output above"
        }

    - name: Prepare screenshot for archiving
      run: |
        cp screencap.png screenshot-py${{ matrix.python-version }}.png

    - name: Archive a screenshot
      uses: actions/upload-artifact@v7
      with:
        name: screenshot-py${{ matrix.python-version }}
        path: screenshot-*.png
