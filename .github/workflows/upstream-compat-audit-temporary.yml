name: Temporary upstream compatibility audit

on:
  push:
    branches:
      - agent/zh-cn-upstream-compat
    paths:
      - '.github/workflows/upstream-compat-audit-temporary.yml'
  pull_request:
    branches:
      - agent/zh-cn-integration-review
    paths:
      - '.github/workflows/upstream-compat-audit-temporary.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch latest upstream main
        run: |
          git remote add upstream https://github.com/mathoudebine/turing-smart-screen-python.git
          git fetch --no-tags upstream main:refs/remotes/upstream/main
          git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Audit cumulative localization head
        run: |
          git checkout --detach 6fb4dc5f8cb5dfea02f47e3c8ac23e999f526e93
          python tools/upstream_sync_report.py \
            --upstream-ref upstream/main \
            --local-ref HEAD \
            --format markdown \
            --output upstream-sync-report.md
          python tools/upstream_sync_report.py \
            --upstream-ref upstream/main \
            --local-ref HEAD \
            --format json \
            --output upstream-sync-report.json
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          metadata = {
              "upstream_head": subprocess.check_output(
                  ["git", "rev-parse", "upstream/main"], text=True
              ).strip(),
              "fork_main_head": subprocess.check_output(
                  ["git", "rev-parse", "origin/main"], text=True
              ).strip(),
              "localization_head": subprocess.check_output(
                  ["git", "rev-parse", "HEAD"], text=True
              ).strip(),
              "merge_base": subprocess.check_output(
                  ["git", "merge-base", "upstream/main", "HEAD"], text=True
              ).strip(),
          }
          Path("upstream-sync-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          report = json.loads(
              Path("upstream-sync-report.json").read_text(encoding="utf-8")
          )
          assert metadata["upstream_head"] == "a3a375dbfe52ae8ee48349cb6ff476c4767a232a"
          assert metadata["fork_main_head"] == metadata["upstream_head"]
          assert metadata["localization_head"] == "6fb4dc5f8cb5dfea02f47e3c8ac23e999f526e93"
          assert metadata["merge_base"] == metadata["upstream_head"]
          assert len(report["upstream_changes"]) == 0
          assert len(report["local_changes"]) == 57
          assert len(report["overlaps"]) == 0
          PY

      - name: Publish audit summary
        run: cat upstream-sync-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload transient audit reports
        uses: actions/upload-artifact@v7
        with:
          name: upstream-compat-audit
          path: |
            upstream-sync-report.md
            upstream-sync-report.json
            upstream-sync-metadata.json
          if-no-files-found: error
          retention-days: 1
