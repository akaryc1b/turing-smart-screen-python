name: zh-CN runtime editor bootstrap

on:
  push:
    branches:
      - agent/zh-cn-runtime-editor

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/zh-cn-runtime-editor
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Apply runtime and editor localization
        id: apply
        continue-on-error: true
        run: python tools/apply_runtime_editor_localization.py > runtime-editor-migration-error.log 2>&1

      - name: Commit migration diagnostics
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime-editor-migration-error.log
          git commit -m "chore: capture runtime editor migration failure [skip ci]"
          git push origin HEAD:agent/zh-cn-runtime-editor
          exit 1

      - name: Validate Python syntax
        run: python -m py_compile library/i18n.py main.py theme-editor.py tests/test_i18n.py

      - name: Run localization unit tests
        run: python -m unittest tests.test_i18n -v

      - name: Verify localized UI entry points
        run: |
          grep -F 'name=tr("app.name")' main.py
          grep -F 'text=tr("common.configure")' main.py
          grep -F 'viewer.title(tr("app.theme_editor_title"))' theme-editor.py
          grep -F 'text=tr("theme_editor.coordinate_hint")' theme-editor.py

      - name: Commit generated source
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py theme-editor.py
          git commit -m "feat: localize runtime tray and theme editor [skip ci]"
          git push origin HEAD:agent/zh-cn-runtime-editor
