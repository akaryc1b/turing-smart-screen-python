name: zh-CN configurator bootstrap

on:
  push:
    branches:
      - agent/zh-cn-configurator
  pull_request:
    branches:
      - agent/zh-cn-i18n-foundation

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Apply configurator localization
        id: apply
        continue-on-error: true
        run: python tools/run_configurator_localization.py > migration-error.log 2>&1

      - name: Upload migration diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: configurator-migration-error
          path: migration-error.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after migration failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat migration-error.log
          exit 1

      - name: Validate Python syntax
        run: python -m py_compile library/i18n.py configure.py tests/test_i18n.py

      - name: Run localization unit tests
        run: python -m unittest tests.test_i18n -v

      - name: Validate translation catalogs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for catalog in sorted(Path('locales').glob('*.json')):
              with catalog.open(encoding='utf-8') as stream:
                  data = json.load(stream)
              if not isinstance(data, dict):
                  raise SystemExit(f'{catalog} must contain a JSON object')
              print(f'Validated {catalog}')
          PY

      - name: Commit generated configurator changes
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configure.py
          git commit -m "feat: localize configuration wizard [skip ci]"
          git push origin HEAD:${BRANCH_NAME}
