name: Frozen Simplified Chinese smoke

on:
  pull_request:
    paths:
      - 'configure.py'
      - 'theme-editor.py'
      - 'config.yaml'
      - 'frozen-smoke.spec'
      - 'library/config.py'
      - 'library/display.py'
      - 'library/fonts.py'
      - 'library/i18n.py'
      - 'library/resources.py'
      - 'library/lcd/lcd_simulated.py'
      - 'locales/**'
      - 'res/themes/3.5inchTheme2-zh-CN/**'
      - 'tools/localization_coverage.py'
      - 'tools/localization-allowlist.json'
      - 'tests/test_localization_coverage.py'
      - '.github/workflows/localization-coverage.yml'
      - 'tools/frozen_smoke.py'
      - 'tools/run_frozen_smoke.py'
      - 'tests/test_frozen_smoke.py'
      - 'tests/test_simulated_display.py'
      - '.github/workflows/frozen-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frozen-zh-cn-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Validate frozen smoke policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Validate smoke sources
        run: |
          python -m py_compile \
            tools/frozen_smoke.py \
            tools/run_frozen_smoke.py \
            tests/test_frozen_smoke.py \
            tests/test_simulated_display.py
          python -m unittest \
            tests.test_frozen_smoke \
            tests.test_simulated_display \
            -v

  windows-frozen-smoke:
    name: Windows frozen zh_CN smoke
    needs: static-validation
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build isolated frozen smoke executable
        run: pyinstaller.exe --noconfirm --clean frozen-smoke.spec

      - name: Run frozen Simplified Chinese smoke with timeout
        shell: pwsh
        run: |
          python.exe tools\run_frozen_smoke.py `
            --executable .\dist\frozen-smoke\frozen-smoke.exe `
            --artifacts-dir .\frozen-smoke-artifacts `
            --timeout-seconds 90

      - name: Archive Windows frozen smoke evidence
        uses: actions/upload-artifact@v7
        with:
          name: frozen-zh-cn-smoke-windows
          path: |
            frozen-smoke-artifacts/frozen-smoke.png
            frozen-smoke-artifacts/frozen-smoke-report.json
          if-no-files-found: error
          retention-days: 14

  linux-frozen-smoke:
    name: Linux frozen zh_CN smoke
    needs: static-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build isolated frozen smoke executable
        run: pyinstaller --noconfirm --clean frozen-smoke.spec

      - name: Run frozen Simplified Chinese smoke with timeout
        run: |
          python tools/run_frozen_smoke.py \
            --executable ./dist/frozen-smoke/frozen-smoke \
            --artifacts-dir ./frozen-smoke-artifacts \
            --timeout-seconds 90

      - name: Archive Linux frozen smoke evidence
        uses: actions/upload-artifact@v7
        with:
          name: frozen-zh-cn-smoke-linux
          path: |
            frozen-smoke-artifacts/frozen-smoke.png
            frozen-smoke-artifacts/frozen-smoke-report.json
          if-no-files-found: error
          retention-days: 14
