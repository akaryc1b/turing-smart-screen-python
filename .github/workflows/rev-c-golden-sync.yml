name: Rev C golden sync

on:
  push:
    branches:
      - agent/zh-cn-theme-docs
    paths:
      - '.github/workflows/rev-c-golden-sync.yml'

permissions:
  contents: write

jobs:
  refresh-goldens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/zh-cn-theme-docs
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Record revision C golden fixtures
        env:
          RECORD_GOLDEN: '1'
        run: python -m unittest tests.library.lcd.test_lcd_comm_rev_c -v

      - name: Commit generated fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/library/lcd/golden/rev_c_*.txt
          git diff --cached --quiet && exit 0
          git commit -m "test: refresh revision C golden fixtures"
          git push origin HEAD:agent/zh-cn-theme-docs
