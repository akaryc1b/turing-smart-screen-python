name: Temporary localization bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/localization-bootstrap.yml'

permissions:
  contents: read

concurrency:
  group: localization-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create temporary source snapshot
        env:
          SNAPSHOT_PATH: ${{ runner.temp }}/source-snapshot.tar.gz
        run: |
          python - <<'PY'
          import os
          import tarfile
          from pathlib import Path

          root = Path.cwd()
          requested = [
              '.github',
              'docs',
              'library',
              'locales',
              'tests',
              'tools',
              'configure.py',
              'theme-editor.py',
              'main.py',
              'README.md',
              'README.zh-CN.md',
              'requirements.txt',
              'requirements-dev.txt',
              'setup.cfg',
              'pyproject.toml',
          ]
          with tarfile.open(os.environ['SNAPSHOT_PATH'], 'w:gz') as archive:
              for name in requested:
                  path = root / name
                  if path.exists():
                      archive.add(path, arcname=name)
          PY

      - name: Upload temporary source snapshot
        uses: actions/upload-artifact@v7
        with:
          name: temporary-source-snapshot
          path: ${{ runner.temp }}/source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
