name: Temporary stage 14 stale-run cleanup

on:
  pull_request:
    paths:
      - '.github/workflows/stage14-cancel-stale-temporary.yml'

permissions:
  actions: write
  contents: read

concurrency:
  group: temporary-stage14-stale-run-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cancel-stale-runs:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Cancel other active pull request runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repository = os.environ['GH_REPOSITORY']
          head_branch = os.environ['HEAD_BRANCH']
          current_run_id = int(os.environ['CURRENT_RUN_ID'])
          token = os.environ['GH_TOKEN']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          cancelled = []
          page = 1
          while True:
              query = urllib.parse.urlencode({
                  'branch': head_branch,
                  'event': 'pull_request',
                  'per_page': 100,
                  'page': page,
              })
              url = f'https://api.github.com/repos/{repository}/actions/runs?{query}'
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  runs = json.load(response)['workflow_runs']
              if not runs:
                  break

              for run in runs:
                  run_id = int(run['id'])
                  if run_id == current_run_id or run['status'] == 'completed':
                      continue
                  cancel_url = (
                      f'https://api.github.com/repos/{repository}'
                      f'/actions/runs/{run_id}/cancel'
                  )
                  cancel_request = urllib.request.Request(
                      cancel_url,
                      data=b'',
                      headers=headers,
                      method='POST',
                  )
                  try:
                      with urllib.request.urlopen(cancel_request) as response:
                          response.read()
                      cancelled.append(run_id)
                  except urllib.error.HTTPError as error:
                      if error.code not in (409, 422):
                          raise
              page += 1

          print(f'Cancelled {len(cancelled)} stale run(s): {cancelled}')
          PY
