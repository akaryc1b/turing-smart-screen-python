name: Temporary stage 14 final apply

on:
  pull_request:
    paths:
      - '.stage14/localization-final.part-*'
      - '.github/workflows/stage14-apply-temporary.yml'

permissions:
  contents: write

concurrency:
  group: temporary-stage14-final-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-final:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out latest stage branch
        uses: actions/checkout@v6
        with:
          ref: agent/zh-cn-coverage-audit
          fetch-depth: 0

      - name: Decode final localization audit files
        run: |
          cat .stage14/localization-final.part-* \
            | base64 --decode \
            | zstd --decompress --stdout \
            | tar -xf -

      - name: Ignore generated localization reports
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.gitignore')
          source = path.read_text(encoding='utf-8')
          markers = (
              '/localization-coverage.json',
              '/localization-coverage.md',
          )
          missing = [marker for marker in markers if marker not in source]
          if missing:
              anchor = '/upstream-sync-report.json\n'
              addition = ''.join(f'{marker}\n' for marker in missing)
              if anchor in source:
                  source = source.replace(anchor, anchor + addition, 1)
              else:
                  source = source.rstrip() + '\n\n# Localization maintenance reports\n' + addition
              path.write_text(source, encoding='utf-8')
          PY

      - name: Validate final localization audit files
        run: |
          python -m py_compile tools/localization_coverage.py tests/test_localization_coverage.py
          python -m unittest tests.test_localization_coverage -v
          python tools/localization_coverage.py \
            --format json \
            --output "$RUNNER_TEMP/localization-coverage.json" \
            --fail-on-errors
          python tools/localization_coverage.py \
            --format markdown \
            --output "$RUNNER_TEMP/localization-coverage.md"

      - name: Commit final localization audit files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .stage14/localization-final.part-* .stage14/localization-core.tar.zst.b64
          git add \
            .github/workflows/frozen-smoke.yml \
            .github/workflows/i18n.yml \
            .github/workflows/localization-coverage.yml \
            .gitignore \
            README.zh-CN.md \
            docs/zh-CN/README.md \
            docs/zh-CN/localization-coverage.md \
            tests/test_localization_coverage.py \
            tests/test_localization_maintenance.py \
            tools/localization_coverage.py \
            tools/windows-installer/turing-system-monitor.iss
          git diff --cached --check
          git commit -m 'ci: add localization coverage audit'
          git push origin HEAD:agent/zh-cn-coverage-audit
