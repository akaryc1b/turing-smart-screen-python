name: Temporary stage 15 tree metadata

on:
  pull_request:
    paths:
      - '.github/workflows/stage15-apply-temporary.yml'

permissions:
  contents: read

concurrency:
  group: temporary-stage15-tree-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  export-tree:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Resolve current commit and tree
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          auth_header=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
          git init . >/dev/null
          git config http.https://github.com/.extraheader "AUTHORIZATION: basic $auth_header"
          git remote add origin "https://github.com/$GH_REPOSITORY.git"
          git fetch --filter=blob:none --no-tags --depth=1 origin \
            "refs/heads/$HEAD_BRANCH" >/dev/null 2>&1
          echo "CURRENT_COMMIT=$(git rev-parse FETCH_HEAD)"
          echo "CURRENT_TREE=$(git rev-parse 'FETCH_HEAD^{tree}')"
