name: Temporary stage 15 maintenance apply

on:
  pull_request:
    paths:
      - '.stage15/final.part-*'
      - '.github/workflows/stage15-apply-temporary.yml'

permissions:
  actions: write
  contents: write

concurrency:
  group: temporary-stage15-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-maintenance:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - name: Check out maintenance branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and apply maintenance payload
        run: |
          cat .stage15/final.part-* > /tmp/stage15-final.b64
          base64 --decode /tmp/stage15-final.b64 > /tmp/stage15-final.tar.gz
          echo 'b4b350faa4d64a4eea6bb0538a556e89ff8d15d76fd103f2f529fc037f433488  /tmp/stage15-final.tar.gz' \
            | sha256sum --check --strict
          tar -xzf /tmp/stage15-final.tar.gz
          git rm -f .stage15/final.part-* \
            .github/workflows/stage15-apply-temporary.yml

      - name: Validate maintenance safeguards
        run: |
          mkdir -p /tmp/stage15-yaml-shim
          cat > /tmp/stage15-yaml-shim/yaml.py <<'PY'
          def safe_load(source):
              jobs = {}
              in_jobs = False
              current_job = None
              for raw_line in source.splitlines():
                  stripped = raw_line.strip()
                  indent = len(raw_line) - len(raw_line.lstrip())
                  if not in_jobs:
                      if indent == 0 and stripped == 'jobs:':
                          in_jobs = True
                      continue
                  if stripped and indent == 0:
                      break
                  if indent == 2 and stripped.endswith(':'):
                      current_job = stripped[:-1]
                      jobs[current_job] = {}
                  elif (
                      current_job
                      and indent == 4
                      and stripped.startswith('timeout-minutes:')
                  ):
                      jobs[current_job]['timeout-minutes'] = stripped.split(
                          ':', 1
                      )[1].strip()
              return {'jobs': jobs}
          PY
          python3 -m py_compile tests/test_repository_hygiene.py
          PYTHONPATH=/tmp/stage15-yaml-shim python3 -m unittest \
            tests.test_repository_hygiene \
            tests.test_localization_maintenance \
            tests.test_dependency_review_policy \
            -v
          python3 - <<'PY'
          from pathlib import Path

          for workflow in sorted(Path('.github/workflows').glob('*.yml')):
              source = workflow.read_text(encoding='utf-8')
              if not source.strip() or '\t' in source:
                  raise SystemExit(f'Invalid workflow text: {workflow}')
              if source.count('${{') != source.count('}}'):
                  raise SystemExit(f'Unbalanced workflow expressions: {workflow}')
              print(f'Checked workflow text {workflow}')
          PY

      - name: Cancel obsolete pull request runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repository = os.environ['GH_REPOSITORY']
          branch = os.environ['HEAD_BRANCH']
          current_run = int(os.environ['CURRENT_RUN_ID'])
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28',
          }
          cancelled = []
          page = 1
          while True:
              query = urllib.parse.urlencode({
                  'branch': branch,
                  'event': 'pull_request',
                  'per_page': 100,
                  'page': page,
              })
              url = f'https://api.github.com/repos/{repository}/actions/runs?{query}'
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  runs = json.load(response)['workflow_runs']
              if not runs:
                  break
              for run in runs:
                  run_id = int(run['id'])
                  if run_id == current_run or run['status'] == 'completed':
                      continue
                  cancel_url = (
                      f'https://api.github.com/repos/{repository}'
                      f'/actions/runs/{run_id}/cancel'
                  )
                  cancel_request = urllib.request.Request(
                      cancel_url,
                      data=b'',
                      headers=headers,
                      method='POST',
                  )
                  try:
                      with urllib.request.urlopen(cancel_request) as response:
                          response.read()
                      cancelled.append(run_id)
                  except urllib.error.HTTPError as error:
                      if error.code not in (409, 422):
                          raise
              page += 1
          print(f'Cancelled {len(cancelled)} obsolete run(s): {cancelled}')
          PY

      - name: Commit final maintenance safeguards
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: enforce final localization maintenance safeguards'
          git fetch origin agent/zh-cn-coverage-audit
          python3 - <<'PY'
          import subprocess

          expected = {
              '.github/workflows/codeql.yml',
              '.github/workflows/generate-linux-packages.yml',
              '.github/workflows/generate-windows-packages-debug.yml',
              '.github/workflows/generate-windows-packages.yml',
              '.github/workflows/i18n.yml',
              '.github/workflows/lint-flake8.yml',
              '.github/workflows/release-bundle-validation.yml',
              '.github/workflows/simple-program-linux.yml',
              '.github/workflows/simple-program-macos.yml',
              '.github/workflows/simple-program-windows.yml',
              '.github/workflows/system-monitor-linux.yml',
              '.github/workflows/system-monitor-macos.yml',
              '.github/workflows/system-monitor-windows.yml',
              '.github/workflows/themes-screenshot-on-pr.yml',
              '.github/workflows/themes-screenshot-on-push.yml',
              'README.zh-CN.md',
              'docs/zh-CN/README.md',
              'docs/zh-CN/final-maintenance.md',
              'docs/zh-CN/upstream-sync.md',
              'tests/test_repository_hygiene.py',
          }
          output = subprocess.check_output(
              [
                  'git', 'diff', '--name-only',
                  'origin/agent/zh-cn-coverage-audit...HEAD',
              ],
              text=True,
          )
          actual = set(output.splitlines())
          if actual != expected:
              raise SystemExit(
                  f'Unexpected final diff; missing={sorted(expected - actual)}, '
                  f'extra={sorted(actual - expected)}'
              )
          print(f'Validated final diff with {len(actual)} files')
          PY
          git push origin HEAD:${{ github.head_ref }}
