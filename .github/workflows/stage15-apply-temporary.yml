name: Temporary stage 15 maintenance apply

on:
  pull_request:
    paths:
      - '.stage15/**'
      - '.github/workflows/stage15-apply-temporary.yml'

permissions:
  actions: write
  contents: write

concurrency:
  group: temporary-stage15-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-maintenance:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - name: Check out maintenance branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          auth_header=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
          git init . >/dev/null
          git config http.https://github.com/.extraheader "AUTHORIZATION: basic $auth_header"
          git remote add origin "https://github.com/$GH_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin \
            "refs/heads/$HEAD_BRANCH:refs/remotes/origin/$HEAD_BRANCH" \
            >/dev/null 2>&1
          git checkout --force -B "$HEAD_BRANCH" \
            "refs/remotes/origin/$HEAD_BRANCH" >/dev/null 2>&1

      - name: Reconstruct and apply maintenance payload
        run: |
          cat .stage15/final.part-* > /tmp/stage15-final.b64
          base64 --decode /tmp/stage15-final.b64 > /tmp/stage15-final.tar.gz
          echo 'b4b350faa4d64a4eea6bb0538a556e89ff8d15d76fd103f2f529fc037f433488  /tmp/stage15-final.tar.gz' \
            | sha256sum --check --strict
          tar -xzf /tmp/stage15-final.tar.gz
          git rm -f .stage15/final.part-* \
            .github/workflows/stage15-apply-temporary.yml

      - name: Validate maintenance safeguards
        run: python3 .stage15/validate.py

      - name: Cancel obsolete pull request runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repository = os.environ['GH_REPOSITORY']
          branch = os.environ['HEAD_BRANCH']
          current_run = int(os.environ['CURRENT_RUN_ID'])
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28',
          }
          cancelled = []
          page = 1
          while True:
              query = urllib.parse.urlencode({
                  'branch': branch,
                  'event': 'pull_request',
                  'per_page': 100,
                  'page': page,
              })
              url = f'https://api.github.com/repos/{repository}/actions/runs?{query}'
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  runs = json.load(response)['workflow_runs']
              if not runs:
                  break
              for run in runs:
                  run_id = int(run['id'])
                  if run_id == current_run or run['status'] == 'completed':
                      continue
                  cancel_url = (
                      f'https://api.github.com/repos/{repository}'
                      f'/actions/runs/{run_id}/cancel'
                  )
                  cancel_request = urllib.request.Request(
                      cancel_url,
                      data=b'',
                      headers=headers,
                      method='POST',
                  )
                  try:
                      with urllib.request.urlopen(cancel_request) as response:
                          response.read()
                      cancelled.append(run_id)
                  except urllib.error.HTTPError as error:
                      if error.code not in (409, 422):
                          raise
              page += 1
          print(f'Cancelled {len(cancelled)} obsolete run(s): {cancelled}')
          PY

      - name: Commit final maintenance safeguards
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: enforce final localization maintenance safeguards'
          git push origin HEAD:${{ github.head_ref }}
