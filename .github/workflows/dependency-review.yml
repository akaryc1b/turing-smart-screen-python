# Dependency Review Action
#
# This Action scans dependency manifest files that change as part of a Pull
# Request and blocks newly introduced vulnerable dependencies.
#
# Source repository: https://github.com/actions/dependency-review-action
# Security CI rationale and fork limitation:
# docs/zh-CN/dependency-review.md
name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: 'Dependency Review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
