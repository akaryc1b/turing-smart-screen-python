name: One-shot DMC localized release

on:
  push:
    branches:
      - agent/brand-dmc-credit
    paths:
      - .github/workflows/one-shot-localized-release.yml

permissions:
  actions: write
  contents: write

concurrency:
  group: one-shot-dmc-localized-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish DMC localized release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out orchestration branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Dispatch validated RC and localized publisher
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_PATH: .release-orchestration-status.json
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          VERSION="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('tools/upstream-release.json').read_text(encoding='utf-8'))['version'])
          PY
          )"
          MAIN_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.sha')"
          RC_RUN_ID=""
          PUBLISH_RUN_ID=""
          REVISION=""
          TAG=""

          record_status() {
            local phase="$1"
            local detail="${2:-}"
            jq -n \
              --arg phase "$phase" \
              --arg detail "$detail" \
              --arg version "$VERSION" \
              --arg main_sha "$MAIN_SHA" \
              --arg revision "$REVISION" \
              --arg tag "$TAG" \
              --arg rc_run_id "$RC_RUN_ID" \
              --arg publish_run_id "$PUBLISH_RUN_ID" \
              --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{phase:$phase,detail:$detail,version:$version,main_sha:$main_sha,localization_revision:$revision,tag:$tag,rc_run_id:$rc_run_id,publish_run_id:$publish_run_id,updated_at:$updated_at}' \
              > "$STATUS_PATH"
            git add "$STATUS_PATH"
            git commit -m "chore: record localized release status ($phase)" || true
            git push origin "HEAD:$GITHUB_REF_NAME"
          }

          record_status "starting" "Resolving the next localization revision"

          MAX_REVISION=0
          while IFS= read -r ref; do
            [[ -n "$ref" ]] || continue
            suffix="${ref##*.}"
            if [[ "$suffix" =~ ^[0-9]+$ ]] && (( suffix > MAX_REVISION )); then
              MAX_REVISION="$suffix"
            fi
          done < <(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/${VERSION}-zh-cn." \
              --jq '.[].ref' 2>/dev/null || true
          )
          REVISION="$((MAX_REVISION + 1))"
          TAG="${VERSION}-zh-cn.${REVISION}"
          record_status "revision_selected" "Selected $TAG"

          RC_DISPATCHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/actions/workflows/release-candidate.yml/dispatches" \
            -f ref=main

          for _ in $(seq 1 30); do
            RUNS_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/release-candidate.yml/runs?event=workflow_dispatch&branch=main&per_page=30")"
            RC_RUN_ID="$(jq -r \
              --arg cutoff "$RC_DISPATCHED_AT" \
              --arg sha "$MAIN_SHA" \
              '[.workflow_runs[] | select(.event == "workflow_dispatch" and .head_branch == "main" and .head_sha == $sha and .created_at >= $cutoff)] | sort_by(.created_at) | last | .id // empty' \
              <<<"$RUNS_JSON")"
            [[ -n "$RC_RUN_ID" ]] && break
            sleep 5
          done
          [[ -n "$RC_RUN_ID" ]] || {
            record_status "failed" "Unable to locate the dispatched release-candidate run"
            exit 1
          }
          record_status "rc_running" "Release candidate run $RC_RUN_ID is running"

          for _ in $(seq 1 180); do
            RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RC_RUN_ID")"
            RUN_STATUS="$(jq -r '.status' <<<"$RUN_JSON")"
            RUN_CONCLUSION="$(jq -r '.conclusion // ""' <<<"$RUN_JSON")"
            if [[ "$RUN_STATUS" == "completed" ]]; then
              if [[ "$RUN_CONCLUSION" != "success" ]]; then
                record_status "failed" "Release candidate run $RC_RUN_ID concluded $RUN_CONCLUSION"
                exit 1
              fi
              break
            fi
            sleep 30
          done
          RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RC_RUN_ID")"
          [[ "$(jq -r '.status' <<<"$RUN_JSON")" == "completed" && "$(jq -r '.conclusion' <<<"$RUN_JSON")" == "success" ]] || {
            record_status "failed" "Release candidate run $RC_RUN_ID did not complete successfully before timeout"
            exit 1
          }
          record_status "rc_succeeded" "Release candidate run $RC_RUN_ID succeeded"

          PUBLISH_DISPATCHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg ref main \
            --arg run_id "$RC_RUN_ID" \
            --arg revision "$REVISION" \
            '{ref:$ref,inputs:{run_id:$run_id,localization_revision:$revision}}' \
            | gh api --method POST \
                "repos/$GITHUB_REPOSITORY/actions/workflows/publish-localized-release.yml/dispatches" \
                --input -

          for _ in $(seq 1 30); do
            RUNS_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/publish-localized-release.yml/runs?event=workflow_dispatch&branch=main&per_page=30")"
            PUBLISH_RUN_ID="$(jq -r \
              --arg cutoff "$PUBLISH_DISPATCHED_AT" \
              --arg sha "$MAIN_SHA" \
              '[.workflow_runs[] | select(.event == "workflow_dispatch" and .head_branch == "main" and .head_sha == $sha and .created_at >= $cutoff)] | sort_by(.created_at) | last | .id // empty' \
              <<<"$RUNS_JSON")"
            [[ -n "$PUBLISH_RUN_ID" ]] && break
            sleep 5
          done
          [[ -n "$PUBLISH_RUN_ID" ]] || {
            record_status "failed" "Unable to locate the localized publisher run"
            exit 1
          }
          record_status "publish_running" "Localized publisher run $PUBLISH_RUN_ID is running"

          for _ in $(seq 1 80); do
            RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PUBLISH_RUN_ID")"
            RUN_STATUS="$(jq -r '.status' <<<"$RUN_JSON")"
            RUN_CONCLUSION="$(jq -r '.conclusion // ""' <<<"$RUN_JSON")"
            if [[ "$RUN_STATUS" == "completed" ]]; then
              if [[ "$RUN_CONCLUSION" != "success" ]]; then
                record_status "failed" "Publisher run $PUBLISH_RUN_ID concluded $RUN_CONCLUSION"
                exit 1
              fi
              break
            fi
            sleep 15
          done
          RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PUBLISH_RUN_ID")"
          [[ "$(jq -r '.status' <<<"$RUN_JSON")" == "completed" && "$(jq -r '.conclusion' <<<"$RUN_JSON")" == "success" ]] || {
            record_status "failed" "Publisher run $PUBLISH_RUN_ID did not complete successfully before timeout"
            exit 1
          }

          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName,name,publishedAt,url >/dev/null
          record_status "published" "Published $TAG from RC run $RC_RUN_ID"
